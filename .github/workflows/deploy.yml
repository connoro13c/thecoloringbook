name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npm run type-check
      
      - name: Lint
        run: npm run lint
      
      - name: Run tests
        run: npm run test:coverage
      
      - name: Build
        run: npm run build
      
      - name: Security audit
        run: npm audit --audit-level moderate

  deploy:
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment-url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
      
      - name: Comment deployment URL
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = '${{ steps.deploy.outputs.deployment-url }}';
            
            if (context.payload.commits && context.payload.commits.length > 0) {
              const commit = context.payload.commits[0];
              
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: commit.id,
                body: `🚀 Deployed to production: ${deploymentUrl}`
              });
            }

  post-deploy-checks:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 30
      
      - name: Health check
        run: |
          curl -f https://${{ secrets.PRODUCTION_DOMAIN }}/api/v1/health || exit 1
      
      - name: Status page check
        run: |
          curl -f https://${{ secrets.PRODUCTION_DOMAIN }}/status || exit 1
      
      - name: API endpoints check
        run: |
          curl -f https://${{ secrets.PRODUCTION_DOMAIN }}/api/v1/status || exit 1
      
      - name: Core Web Vitals check
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://${{ secrets.PRODUCTION_DOMAIN }}
            https://${{ secrets.PRODUCTION_DOMAIN }}/upload
            https://${{ secrets.PRODUCTION_DOMAIN }}/status
          configPath: ./.github/lighthouse/lighthouserc.json
      
      - name: Notify deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('✅ Production deployment successful');
            console.log('🔍 All health checks passed');
            
      - name: Notify deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('❌ Production deployment failed');
            console.log('🚨 Health checks or performance tests failed');
            process.exit(1);